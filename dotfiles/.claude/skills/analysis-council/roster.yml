council: analysis-council
required:
  - skeptical-data-scientist
  - decision-scientist
optional:
  - statistician
  - causal-reasoner
  - counterfactual-check
  - bias-auditor
  - governance-reviewer
  - exec-audience-stand-in
  - ops-analyst
  - economist
  - visualization-critic
limits:
  min_experts: 2
  max_experts: 5
# #2 Quorum: synthesis is only valid if EVERY required persona returned
# status: contributing. Any required persona timed_out/errored => run is
# INVALID (report partial reads, do not emit a confident synthesis).
quorum:
  required_all_contributing: true
# #1 Decorrelate errors: do NOT run every lens on one base model — an
# ensemble of clones shares blind spots. Static tier map (no router agent:
# model tier tracks persona ROLE, which rarely changes; stakes->depth is
# already handled by --fast/default/--round-3).
# ponytail: within one model family diversity is partial. Ceiling = same-family
# correlated errors. Upgrade path: if a cross-family model is configured, route
# `cross_family` roles below to it (biggest decorrelation win).
model_policy:
  synthesis: {model: opus, reasoning: high}
  default:   {model: sonnet, reasoning: high}
  by_persona:
    skeptical-data-scientist: {model: opus,   reasoning: high, cross_family: true}   # primary adversary
    decision-scientist:       {model: opus,   reasoning: high}
    bias-auditor:             {model: opus,   reasoning: high, cross_family: true}
    causal-reasoner:          {model: opus,   reasoning: high}
    economist:                {model: opus,   reasoning: high}
    statistician:             {model: sonnet, reasoning: high}
    counterfactual-check:     {model: sonnet, reasoning: high}
    governance-reviewer:      {model: sonnet, reasoning: medium}
    exec-audience-stand-in:   {model: sonnet, reasoning: medium}
    ops-analyst:              {model: sonnet, reasoning: medium}
    visualization-critic:     {model: sonnet, reasoning: medium}
round_1_dispatch: parallel
post_process:
  humanizer: true
  domain_cleaner: analysis-slop-cleaner
recommend_round_3: true
overlays:
  skeptical-data-scientist: |
    User context: CDO at ClassDojo (edu-tech, K-8, child users).
    Weight COPPA, FERPA, and under-13 consent lenses heavily.
    Flag analyses that depend on under-13 user data without
    parent-consent context, or that conflate teacher-segment
    behavior with parent-segment or student-segment behavior.
  decision-scientist: |
    User is a CDO making decisions that frequently touch:
    - Data platform / instrumentation investment (often one-way doors)
    - Org structure / hiring (one-way doors)
    - Metric definition changes (one-way doors for trend continuity)
    Bias toward flagging reversibility explicitly when the topic
    touches any of these.
  governance-reviewer: |
    Activate when topic mentions: child data, under-13 users,
    parent consent, FERPA, COPPA, GDPR, student records,
    teacher-as-data-controller, school district contracts.
  exec-audience-stand-in: |
    Activate when topic is being prepared for: board, ELT, CEO,
    school district customers, investors. Read the topic as
    that audience would — what they'll fixate on, what will
    confuse them, what they'll push back on.
  economist: |
    Activate for: pricing decisions, vendor build-vs-buy,
    unit economics, cohort LTV/CAC, expansion/churn drivers,
    international pricing, free-vs-paid conversion.
  visualization-critic: |
    Activate when the analysis ships with charts authored as code
    (Vega/Vega-Lite, matplotlib, plotly, ggplot, D3, or the SQL/
    aggregation feeding a figure). Read the spec, not aesthetics.
    Flag only where the ENCODING changes the conclusion: truncated
    or dual axes, unlabeled log scale, binning/aggregation that
    hides variance, chart-type mismatch (e.g. line for categorical),
    color implying false ordering, cherry-picked time window baked
    into the query. Defer layout, palette, and craft polish to
    dashboard-review; stay on whether the picture is honest about
    the claim. If the chart is a screenshot/GUI export (no source),
    say so and hand off to dashboard-review.
  bias-auditor: |
    Activate when the input is a judgment call or recommendation
    (a strategy bet, a "we should" memo, a build/kill call) rather
    than a data analysis — i.e. when the risk is in the reasoning,
    not the denominator. Defer data critiques to
    skeptical-data-scientist and framing/reversibility to
    decision-scientist; stay on the cognitive biases.
# #7 Keyword signals below are HINTS, not gates. The orchestrator is an LLM:
# classify the topic semantically first, then use keywords to confirm/boost.
# A topic phrased without a trigger word must still pull the right lens.
# always_seat: one adversary is seated on EVERY default/round run regardless
# of keywords, so no topic ever gets a soft roster. bias-auditor red-teams the
# reasoning; it critiques the emerging consensus in round 2 (see #6).
smart_pick:
  mode: semantic_first
  always_seat: [bias-auditor]
dispatch_signals:
  # Topic-keyword heuristics that BOOST smart-picking optional personas
  # in default mode. Hints only — semantic classification decides.
  statistician:
    keywords: [cohort, retention, sample, p-value, significance, segment, lift, AB test, experiment]
  causal-reasoner:
    keywords: [caused, drove, led to, because, due to, attributable, drivers of]
  counterfactual-check:
    keywords: [would have, if we hadn't, counterfactual, alternative]
  bias-auditor:
    keywords: [recommend, we should, we believe, judgment, decision, confident, obviously, clearly, narrative, sunk cost, anchor, gut, the case for]
  governance-reviewer:
    keywords: [child, COPPA, FERPA, GDPR, parent consent, under 13, student data, privacy]
  exec-audience-stand-in:
    keywords: [board, ELT, CEO, investor, district, exec, leadership]
  ops-analyst:
    keywords: [SLA, ops, process, throughput, latency, incident, on-call]
  economist:
    keywords: [pricing, LTV, CAC, unit economics, vendor, build vs buy, ROI, cost]
  visualization-critic:
    keywords: [chart, plot, figure, axis, y-axis, dual-axis, log scale, vega, matplotlib, plotly, ggplot, d3, heatmap, visualization, dashboard]
