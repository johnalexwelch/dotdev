council: narrative-council

required:
  - historian
  - political-scientist
  - anthropologist

optional:
  - economist
  - ecologist
  - theologian
  - military-strategist
  - linguist

limits:
  min_experts: 3
  max_experts: 7

round_1_dispatch: waves

waves:
  - name: A
    description: "Foundational — culture, ecology, economy across the timespan."
    members: [anthropologist, ecologist, economist]
  - name: B
    description: "Historical timeline + language drift."
    members: [historian, linguist]
  - name: C
    description: "Religion + politics across the macro arc."
    members: [theologian, political-scientist]
  - name: D
    description: "Military / conflict arcs."
    members: [military-strategist]

post_process:
  humanizer: false
  domain_cleaner: null

recommend_round_3: true

overlays:
  historian: |
    For long-arc narrative: track the chain from off-page event
    to on-page consequence. A revolution off-page in book 1
    should ripple into book 3 in specific ways. Flag dropped
    consequence chains and over-explained ones.

  political-scientist: |
    Track each polity's arc across the timespan. Coalitions
    shift; successions land or fail; opposition channels open
    and close. Flag arcs where the political escalation
    deflates without a payoff.

  anthropologist: |
    Cultures change slowly. Across a generational saga, what
    shifts in kinship, status, ritual, food, dress, speech?
    What stays? Flag cultures that change too fast (anachronistic)
    or freeze where they shouldn't.

  economist: |
    Wealth shifts across the arc. Houses rise and fall, trade
    routes open and close, currencies inflate. Track these
    explicitly across the timespan.

  ecologist: |
    Long arcs often touch climate, species, environmental
    pressure. Are these seeded and paid off? Or are they
    convenient backdrop?

  theologian: |
    Religions move slowly but visibly. Across a generational
    arc, do schisms emerge? Do new prophets? Does the priesthood
    consolidate or fragment? Flag religions frozen across
    centuries.

  military-strategist: |
    Wars take political and economic kindling. Across the
    timespan, are the conflicts properly fueled by earlier
    arcs, or do they appear unmotivated?

  linguist: |
    Language drifts across generations. Loanwords from
    contact, register shifts, archaisms surfacing as
    prestige — are these tracked? Often the absence is fine
    if the timespan is short.
