name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit
        run: pre-commit run --all-files
  shell-syntax:
    name: Shell syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax-check all shell scripts
        run: |
          shopt -s globstar
          for f in **/*.sh; do
            bash -n "$f"
          done
  stow-dry-run:
    name: Stow dry run
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify stow is available
        run: command -v stow || brew install stow
      - name: Dry-run stow
        run: stow -nv -d "$GITHUB_WORKSPACE" -t "$HOME" -R dotfiles
  install-dry-run:
    name: Install dry run
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: dotdev
      - name: Dry-run install
        run: |
          export HOME="$RUNNER_TEMP/fakehome"
          mkdir -p "$HOME"
          cp -R "$GITHUB_WORKSPACE/dotdev" "$HOME/dotdev"
          cd "$HOME/dotdev"
          DRY_RUN=1 bash install.sh
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  auto-merge:
    name: Auto-merge
    needs: [lint, shell-syntax, secrets]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "$PR_URL" --auto --squash
