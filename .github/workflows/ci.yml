name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Cache pre-commit hooks
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit
        run: pre-commit run --all-files
  shell-syntax:
    name: Shell syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Syntax-check all shell scripts
        run: |
          shopt -s globstar
          for f in **/*.sh; do
            bash -n "$f"
          done
  tests:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run test suites
        # Suites need only bash/jq/grep/awk (preinstalled on ubuntu-latest);
        # the workflow-guard suite mocks gh via a stub on PATH.
        run: ./test/run-tests.sh
  stow-dry-run:
    name: Stow dry run
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify stow is available
        run: command -v stow || brew install stow
      - name: Dry-run stow
        env:
          WORKSPACE: ${{ github.workspace }}
          STOW_TARGET: ${{ runner.temp }}/fakehome
        run: |
          mkdir -p "$STOW_TARGET/.claude/skills" "$STOW_TARGET/.config"
          stow -nv -d "$WORKSPACE" -t "$STOW_TARGET" -R dotfiles
  install-dry-run:
    name: Install dry run
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: dotdev
      - name: Dry-run install
        run: |
          export HOME="$RUNNER_TEMP/fakehome"
          mkdir -p "$HOME"
          cp -R "$GITHUB_WORKSPACE/dotdev" "$HOME/dotdev"
          cd "$HOME/dotdev"
          DRY_RUN=1 bash install.sh
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
